<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmbiSync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07070f;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;}
.screen{display:none;width:100%;height:100vh;align-items:center;justify-content:center;flex-direction:column;}
.screen.active{display:flex;}
.logo{font-size:2.6rem;font-weight:800;background:linear-gradient(135deg,#7c6aff,#b06aff,#ff6ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;letter-spacing:-1px;}
.tagline{color:#444;font-size:.85rem;margin-bottom:2rem;}
.cards{display:flex;gap:1.4rem;flex-wrap:wrap;justify-content:center;}
.card{background:#111128;border:1px solid #222244;border-radius:18px;padding:2rem 1.6rem;cursor:pointer;transition:all .22s;text-align:center;width:180px;}
.card:hover{border-color:#7c6aff;transform:translateY(-5px);box-shadow:0 12px 40px rgba(124,106,255,.25);}
.card-icon{font-size:2.6rem;margin-bottom:.7rem;}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:.3rem;}
.card-desc{color:#555;font-size:.78rem;line-height:1.4;}
.btn{background:linear-gradient(135deg,#7c6aff,#b06aff);border:none;color:#fff;padding:.65rem 1.8rem;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .2s;margin-top:.8rem;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-ghost{background:none;border:none;color:#444;font-size:.78rem;cursor:pointer;margin-top:.8rem;padding:.3rem;}
.btn-ghost:hover{color:#888;}
.status{font-size:.82rem;margin-top:.6rem;color:#555;min-height:1.1em;}
.status.ok{color:#4ade80;}.status.err{color:#f87171;}
.panel{background:#111128;border:1px solid #222244;border-radius:16px;padding:1.5rem 1.6rem;text-align:center;max-width:360px;width:90%;}
.peer-label{color:#444;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem;}
.code-box{font-size:2rem;font-weight:800;color:#a78bfa;letter-spacing:6px;padding:.5rem 1rem;background:#0d0d20;border-radius:8px;margin:.4rem 0;font-family:'Courier New',monospace;}
.inp{background:#0d0d20;border:1px solid #222244;color:#fff;padding:.65rem 1rem;border-radius:8px;width:100%;font-size:1.1rem;margin:.5rem 0;text-align:center;letter-spacing:4px;outline:none;font-family:'Courier New',monospace;text-transform:uppercase;}
.inp:focus{border-color:#7c6aff;}
/* Ambilight */
#sAmbi{position:relative;background:#030308;}
.ambi-grid{position:absolute;inset:0;display:grid;grid-template-columns:90px 1fr 90px;grid-template-rows:90px 1fr 90px;}
.edge{display:flex;}
.edge.top,.edge.bottom{flex-direction:row;grid-column:1/4;}
.edge.left,.edge.right{flex-direction:column;}
.edge.top{grid-row:1;}.edge.bottom{grid-row:3;}
.edge.left{grid-row:2;grid-column:1;}.edge.right{grid-row:2;grid-column:3;}
.ambi-mid{grid-row:2;grid-column:2;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;}
.seg{flex:1;transition:background-color 40ms linear;}
.mini-btn{background:#111128;border:1px solid #222;color:#555;font-size:.7rem;padding:.3rem .8rem;border-radius:6px;cursor:pointer;margin-top:.3rem;}
.mini-btn:hover{color:#aaa;}
.fps-badge{color:#1e1e3a;font-size:.7rem;font-family:monospace;}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="sWelcome">
  <div class="logo">✦ AmbiSync</div>
  <div class="tagline">Ekran kenar renklerini ikinci cihazına anlık yansıt</div>
  <div class="cards">
    <div class="card" onclick="initSource()">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Ana Cihaz</div>
      <div class="card-desc">Ekranı yakala ve yayınla</div>
    </div>
    <div class="card" onclick="initDisplay()">
      <div class="card-icon">📱</div>
      <div class="card-title">İkinci Cihaz</div>
      <div class="card-desc">Ambilight efektini görüntüle</div>
    </div>
  </div>
</div>

<!-- SOURCE -->
<div class="screen" id="sSource">
  <h2 style="font-size:1.1rem;margin-bottom:1rem;">🖥️ Ana Cihaz</h2>
  <div class="panel">
    <div class="peer-label">Bağlantı Kodu</div>
    <div class="code-box" id="srcCode">------</div>
    <div class="status" id="srcStatus">Sunucuya bağlanıyor…</div>
  </div>
  <button class="btn" id="captureBtn" onclick="startCapture()" disabled>▶ Ekran Yakalamayı Başlat</button>
  <button class="btn-ghost" onclick="goHome()">← Geri</button>
  <canvas id="cv" style="display:none"></canvas>
</div>

<!-- DISPLAY CONNECT -->
<div class="screen" id="sConnect">
  <div class="panel">
    <div style="font-size:2.2rem;margin-bottom:.4rem;">📱</div>
    <h2 style="font-size:1.1rem;margin-bottom:.4rem;">İkinci Cihaz</h2>
    <p style="color:#555;font-size:.8rem;margin-bottom:.5rem;">Ana cihazdaki 6 haneli kodu gir</p>
    <input class="inp" id="codeInp" maxlength="6" placeholder="A3F9C1"
           oninput="this.value=this.value.toUpperCase().replace(/[^A-F0-9]/g,'')">
    <button class="btn" onclick="joinRoom()" style="width:100%">Bağlan</button>
    <div class="status" id="dispStatus"></div>
  </div>
  <button class="btn-ghost" onclick="goHome()">← Geri</button>
</div>

<!-- AMBILIGHT -->
<div class="screen" id="sAmbi">
  <div class="ambi-grid">
    <div class="edge top"    id="eTop"></div>
    <div class="edge left"   id="eLeft"></div>
    <div class="ambi-mid">
      <div class="fps-badge" id="fpsBadge">AmbiSync</div>
      <button class="mini-btn" onclick="goHome()">✕ Çıkış</button>
    </div>
    <div class="edge right"  id="eRight"></div>
    <div class="edge bottom" id="eBottom"></div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const SEG   = 16;
const DEPTH = 0.03;
const ICE_CFG = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

// Otomatik WSS/WS seçimi – Render'da wss, lokalde ws
const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}`;
})();

/* ── STATE ── */
let ws=null, pc=null, dc=null, stream=null, rafId=null;
let role='', lastTs=0, frameCount=0, fpsTs=0;

/* ── UTILS ── */
const $ = id => document.getElementById(id);
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function setStatus(id,txt,cls=''){const el=$(id);el.textContent=txt;el.className='status '+(cls||'');}

/* ── CLEANUP ── */
function goHome(){
  cleanup(); show('sWelcome');
}
function cleanup(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  if(dc){ try{dc.close();}catch(e){} dc=null; }
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(ws){ try{ws.close();}catch(e){} ws=null; }
}

/* ── WEBSOCKET ── */
function openWS(onOpen){
  ws = new WebSocket(WS_URL);
  ws.onopen  = onOpen;
  ws.onerror = ()=>{ alert('Sunucuya bağlanılamadı:\n'+WS_URL); goHome(); };
  ws.onmessage = e => handleSignal(JSON.parse(e.data));
}
function send(obj){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj)); }

async function handleSignal(msg){
  switch(msg.type){
    case 'created':
      $('srcCode').textContent = msg.code;
      setStatus('srcStatus','İkinci cihazın bağlanması bekleniyor…');
      break;
    case 'joined':
      if(role==='display'){
        setStatus('dispStatus','Bağlandı! Ambilight başlıyor…','ok');
        setTimeout(()=>{ buildEdges(); show('sAmbi'); }, 400);
      }
      break;
    case 'peer_joined':
      await createOffer();
      break;
    case 'offer':
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      send({ type:'answer', sdp:ans });
      break;
    case 'answer':
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      break;
    case 'ice':
      if(msg.candidate) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
      break;
    case 'peer_left':
      goHome(); break;
    case 'error':
      alert(msg.msg); break;
  }
}

/* ── WebRTC COMMON ── */
function createPC(){
  pc = new RTCPeerConnection({ iceServers: ICE_CFG });
  pc.onicecandidate = e => { if(e.candidate) send({ type:'ice', candidate:e.candidate }); };
  pc.onconnectionstatechange = () => {
    if(pc.connectionState==='failed'||pc.connectionState==='disconnected') goHome();
  };
}

/* ── SOURCE ── */
function initSource(){
  role='source';
  show('sSource');
  $('srcCode').textContent='------';
  setStatus('srcStatus','Sunucuya bağlanıyor…');
  $('captureBtn').disabled=true;

  openWS(()=>{
    send({ type:'create' });
    createPC();
    // UDP-like: ordered=false, maxRetransmits=0 → minimum gecikme
    dc = pc.createDataChannel('ambi',{ ordered:false, maxRetransmits:0 });
    dc.binaryType='arraybuffer';
    dc.onopen = ()=>{
      setStatus('srcStatus','✓ Bağlantı kuruldu! Yakalamayı başlatabilirsin.','ok');
      $('captureBtn').disabled=false;
    };
  });
}

async function createOffer(){
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  send({ type:'offer', sdp:offer });
}

async function startCapture(){
  try{
    stream = await navigator.mediaDevices.getDisplayMedia({ video:{ frameRate:{ideal:60}, cursor:'never' } });
  }catch(e){ alert('Ekran seçilmedi veya izin reddedildi.'); return; }

  const vid=document.createElement('video');
  vid.srcObject=stream; vid.play();
  const cv=$('cv'), cx=cv.getContext('2d',{ willReadFrequently:true });

  stream.getVideoTracks()[0].addEventListener('ended', stopCapture);
  $('captureBtn').textContent='⏹ Durdur';
  $('captureBtn').onclick=stopCapture;

  vid.onloadedmetadata=()=>{
    cv.width=vid.videoWidth; cv.height=vid.videoHeight;
    const loop = ts => {
      if(!stream) return;
      rafId=requestAnimationFrame(loop);
      if(ts-lastTs < 14) return; // ~60fps cap
      lastTs=ts;
      cx.drawImage(vid,0,0);
      if(dc&&dc.readyState==='open') dc.send(sampleEdges(cv,cx));
    };
    rafId=requestAnimationFrame(loop);
  };
}

function stopCapture(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  $('captureBtn').textContent='▶ Ekran Yakalamayı Başlat';
  $('captureBtn').onclick=startCapture;
}

/* Binary: 4 × SEG × 3 bytes = 192 bytes/frame */
function sampleEdges(cv,cx){
  const w=cv.width, h=cv.height;
  const dw=Math.max(4,Math.round(w*DEPTH));
  const dh=Math.max(4,Math.round(h*DEPTH));
  const sw=Math.floor(w/SEG), sh=Math.floor(h/SEG);
  const buf=new Uint8Array(SEG*12); let off=0;
  for(let i=0;i<SEG;i++){ let[r,g,b]=avg(cx,i*sw,0,sw,dh);       buf[off++]=r;buf[off++]=g;buf[off++]=b; } // top
  for(let i=0;i<SEG;i++){ let[r,g,b]=avg(cx,i*sw,h-dh,sw,dh);    buf[off++]=r;buf[off++]=g;buf[off++]=b; } // bottom
  for(let i=0;i<SEG;i++){ let[r,g,b]=avg(cx,0,i*sh,dw,sh);        buf[off++]=r;buf[off++]=g;buf[off++]=b; } // left
  for(let i=0;i<SEG;i++){ let[r,g,b]=avg(cx,w-dw,i*sh,dw,sh);    buf[off++]=r;buf[off++]=g;buf[off++]=b; } // right
  return buf.buffer;
}

function avg(cx,x,y,w,h){
  const d=cx.getImageData(x,y,w,h).data;
  let r=0,g=0,b=0,n=d.length>>2;
  for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];}
  return[r/n|0,g/n|0,b/n|0];
}

/* ── DISPLAY ── */
function initDisplay(){
  role='display';
  show('sConnect');
  setStatus('dispStatus','');
  openWS(()=>{
    createPC();
    pc.ondatachannel = e => {
      dc=e.channel;
      dc.binaryType='arraybuffer';
      dc.onmessage = ev => paintAmbi(new Uint8Array(ev.data));
    };
  });
}

function joinRoom(){
  const code=$('codeInp').value.trim();
  if(code.length!==6){ setStatus('dispStatus','6 haneli kod gir','err'); return; }
  setStatus('dispStatus','Bağlanıyor…');
  send({ type:'join', code });
}

function buildEdges(){
  ['eTop','eBottom','eLeft','eRight'].forEach(id=>{
    const el=$(id); el.innerHTML='';
    for(let i=0;i<SEG;i++){
      const s=document.createElement('div');
      s.className='seg'; s.id=id+'_'+i; el.appendChild(s);
    }
  });
}

function paintAmbi(arr){
  const edges=[['eTop',0],['eBottom',SEG],['eLeft',SEG*2],['eRight',SEG*3]];
  for(const[id,base]of edges){
    for(let i=0;i<SEG;i++){
      const o=(base+i)*3, r=arr[o], g=arr[o+1], b=arr[o+2];
      const el=$(id+'_'+i); if(!el) continue;
      el.style.backgroundColor=`rgb(${r},${g},${b})`;
      el.style.boxShadow=`0 0 35px 10px rgba(${r},${g},${b},.7)`;
    }
  }
  frameCount++;
  const now=performance.now();
  if(now-fpsTs>1000){ $('fpsBadge').textContent=`${frameCount} fps`; frameCount=0; fpsTs=now; }
}
</script>
</body>
</html>
